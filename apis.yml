aid: textron
name: Textron
description: >-
  Textron Inc. is a $14.8 billion Fortune 500 multi-industry company
  employing 34,000 people worldwide. Textron operates through five
  business segments: Bell (military and commercial helicopters), Textron
  Aviation (Cessna, Beechcraft, Hawker aircraft), Industrial (Kautex fuel
  systems, Textron Specialized Vehicles including E-Z-GO and Jacobsen),
  Textron Systems (defense and autonomous systems), and Textron Financial.
  As of 2026, Textron does not offer publicly documented developer APIs or
  integration portals.
